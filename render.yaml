services:
  - type: web
    name: sudoku-backend
    env: python
    plan: free
    branch: main
    root: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

databases:
  - name: sudoku-db
    databaseName: sudoku_db
    user: sudoku_user
    plan: free
    engine: postgresql
